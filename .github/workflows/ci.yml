on: [push, pull_request]

name: CI

jobs:
  CI:
    name: CI_Node_${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [20.19.0, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm/action-setup MUST come before actions/setup-node.
      # setup-node@v5 reads packageManager from package.json and tries to locate
      # pnpm during its own step — if pnpm isn't installed yet, it errors with
      # "Unable to locate executable file: pnpm" before corepack enable can run.
      - uses: pnpm/action-setup@v6
        # version omitted — reads from package.json "packageManager" field (pnpm@10.27.0)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.version }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile
