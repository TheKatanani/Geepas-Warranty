on: [push, pull_request]

name: CI

jobs:
  CI:
    name: CI_Node_${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [20.19.0, 22, 24]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # pnpm/action-setup MUST come before actions/setup-node.
      # setup-node@v5 reads packageManager from package.json and tries to locate
      # pnpm during its own step — if pnpm isn't installed yet, it errors with
      # "Unable to locate executable file: pnpm" before corepack enable can run.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.version }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile
