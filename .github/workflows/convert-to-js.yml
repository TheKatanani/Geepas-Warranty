# Disabled: This was a Shopify template maintenance workflow that converts the
# TypeScript template to a JavaScript branch for Shopify's own repo.
# It is not applicable to this app and would always fail (no "javascript" branch,
# no CLA_TOKEN secret). The workflow is kept as a file so future merges from the
# upstream Shopify template don't re-add it without review.
#
# Original source: https://github.com/Shopify/shopify-app-template-remix

name: Create Javascript conversion PR

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manually triggered — this workflow is intentionally disabled"
        required: false

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain why this is disabled
        run: |
          echo "This workflow is a Shopify template tool, not needed for Geepas Warranty."
          echo "It converts TS→JS for Shopify's own javascript branch. Not applicable here."
          exit 0
