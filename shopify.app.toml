# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "41d1d7fae24939000bdbd2935ae8857f"
name = "Warranty Registration"
application_url = "https://geepas-warranty.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/update"
  topics = [ "customers/update" ]
  include_fields = [ "tags", "phone", "first_name", "id" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/create"
  topics = [ "customers/create" ]
  include_fields = [ "id", "first_name", "phone", "tags" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/paid"
  topics = [ "orders/paid" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_metaobject_definitions,read_metaobjects,read_products,read_orders,write_customers,write_metaobject_definitions,write_metaobjects,write_discounts"
[auth]
redirect_urls = [ "https://geepas-warranty.vercel.app/auth/callback" ]
